name: Deploy PHP Application

on:
  push:
    branches:
      - main          

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 66.29.146.127
          username: autodeploy@rayglobals.org
          password: 1GIG+cM}haL?
          port: 21
          protocol: ftp                   # Use 'ftp' for port 21
          local-dir: ./                    # Deploy entire repo, or specify subdirectory like ./public_html/
          server-dir: /                    # Remote directory (e.g., /public_html/ or /var/www/html/)
          state-name: .ftp-deploy-state   # File to track deployments
          exclude: |
            **/.git*
            **/vendor
            **/.env
            **/.github
            **/tests
            **/*.md
      
      - name: Verify deployment
        run: echo "✓ PHP application deployed successfully to FTP server"
      